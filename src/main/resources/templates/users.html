<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Användare</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .user {
            border: 1px solid lightgray;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>

    <style>

        body {
            background-color: #ffe4ec;
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h1 {
            color: hotpink;
        }

        button {
            background-color: hotpink;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: deeppink;
        }

        input {
            padding: 10px;
            border-radius: 20px;
            border: 1px solid pink;
        }

        .product, .user {
            background-color: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
        }

    </style>

</head>
<body>

<h1>Registrerade användare</h1>

<div class="user" th:each="user : ${users}">

    <p>
        Användarnamn:
        <span th:text="${user.username}"></span>
    </p>

</div>

</body>
</html>
